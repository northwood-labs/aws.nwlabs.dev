<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="5;URL='https://aws.nwlabs.dev'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northwood Labs</title>
    <style type="text/css">
      html {
        text-size-adjust: 100%;
        font-size: 100%;
        line-height: 1.15;
      }
      body {
        color: #444;
        overflow-scrolling: touch;
        background-color: #fff;
        margin: 0;
        padding-bottom: 5rem;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Roboto,
          Helvetica Neue,
          Arial,
          sans-serif;
        font-size: 1rem;
        line-height: 1.2rem;

        animation-name: fontfix;
        animation-duration: 0.1s;
        animation-timing-function: linear;
        animation-iteration-count: 1;
        animation-delay: 0.1s;
        overflow: scroll;
      }
      @keyframes fontfix {
        0% {
          opacity: 1;
        }
        to {
          opacity: 1;
        }
      }
      p {
        box-sizing: border-box;
        margin: 0;
        padding: 0.5rem 0;
        display: block;
      }
      ul,
      ol {
        margin: 0 0 0.75rem 2rem;
        padding: 0;
      }
      ul ul,
      ul ol,
      ol ul,
      ol ol {
        margin-bottom: 0;
      }
      li {
        line-height: 1.5rem;
      }
      li h1,
      li h2,
      li h3,
      li h4,
      li h5 {
        padding-bottom: 0;
      }
      a {
        color: #357edd;
        background-color: rgba(0, 0, 0, 0);
        border-bottom: 1px dotted #357edd;
        text-decoration: none;
        transition: color 0.1s ease-in;
        display: inline-block;
      }
      a:hover,
      a:active {
        outline: 0;
      }
      a:hover,
      a:focus {
        color: #96ccff;
        border-bottom: 1px solid #96ccff;
        text-decoration: none;
      }
      a:focus {
        outline: thin dotted #333;
        outline: 5px auto -webkit-focus-ring-color;
        outline-offset: -2px;
      }
      b,
      strong {
        font-weight: bolder;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: #333;
        text-rendering: optimizelegibility;
        font-weight: 600;
        margin: 0;
        padding: 1em 0 0.2em;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Roboto,
          Helvetica Neue,
          Arial,
          sans-serif;
      }
      h1 {
        letter-spacing: -0.1rem;
        font-size: 2.5rem;
        line-height: 1.2em;
      }
      h1 small,
      h2 {
        letter-spacing: -0.1rem;
        font-size: 1.8rem;
        line-height: 1.3em;
      }
      h2 small,
      h3 {
        letter-spacing: -0.1rem;
        font-size: 1.5rem;
        line-height: 1.4em;
      }
      h3 small,
      h4 {
        letter-spacing: 0;
        font-size: 1rem;
        line-height: 1.5em;
      }
      h4 small,
      h5 {
        letter-spacing: 0;
        font-size: 0.875rem;
        line-height: 1.5em;
      }
      h5 small,
      h6 {
        letter-spacing: 0;
        font-size: 0.7rem;
        line-height: 1.5em;
      }
      pre,
      code,
      kbd,
      samp {
        font-family:
          SF Mono,
          Meslo LG S,
          Meslo LG S Regular,
          Menlo,
          Consolas,
          Monaco,
          Courier New,
          monospace,
          monospace;
        font-size: 0.85em;
      }
      code {
        color: #ba2121;
        white-space: nowrap;
        font-smoothing: auto;
        background-color: #f7f7f7;
        border: 1px solid #e5e5e5;
        border-radius: 3px;
        padding: 1px 2px;
        display: inline-block;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #ddd;
          background-color: #171e21;
        }
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
          color: #eee;
        }
        a {
          color: #96ccff;
          border-bottom: 1px dotted #96ccff;
        }
        a:hover,
        a:focus {
          color: #357edd;
          border-bottom: 1px solid #357edd;
        }
        a:focus {
          outline: thin dotted #eee;
        }
      }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <p>This page does not exist.</p>
  </body>
</html>
